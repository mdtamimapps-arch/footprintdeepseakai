<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>📍 Footprint Tracker - Live GPS Movement</title>

    <!-- Leaflet CSS + JS for OpenStreetMap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --accent: #00e5ff;
            --accent2: #ff6ec7;
            --text: #e0e0e0;
            --text2: #a0a0b8;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            --radius: 20px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --glow: 0 0 25px rgba(0, 229, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            flex-direction: column;
        }

        /* ── Header Bar ── */
        .header {
            background: var(--surface);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            gap: 10px;
            flex-shrink: 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .logo .paw {
            font-size: 1.5rem;
            animation: bouncePaw 0.6s ease-in-out infinite alternate;
        }
        @keyframes bouncePaw {
            0% {
                transform: translateY(0) rotate(-5deg);
            }
            100% {
                transform: translateY(-6px) rotate(5deg);
            }
        }
        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--danger);
            transition: all 0.4s;
            box-shadow: 0 0 10px var(--danger);
        }
        .status-dot.active {
            background: var(--success);
            box-shadow: 0 0 16px var(--success);
            animation: pulse-dot 1.2s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 8px var(--success);
            }
            50% {
                box-shadow: 0 0 22px var(--success), 0 0 40px rgba(46, 213, 115, 0.5);
            }
        }
        .header-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--surface2);
            color: var(--text2);
            letter-spacing: 0.5px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* ── Map Container ── */
        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
            background: #1a1a2e;
        }

        /* Custom leaflet styling */
        .leaflet-container {
            background: #1a1a2e !important;
            font-family: inherit !important;
        }
        .leaflet-control-zoom a {
            background: var(--surface) !important;
            color: #fff !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            border-radius: 12px !important;
            margin: 2px !important;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .leaflet-control-zoom a:hover {
            background: var(--surface2) !important;
            border-color: var(--accent) !important;
        }
        .leaflet-popup-content-wrapper {
            background: var(--surface) !important;
            color: #fff !important;
            border-radius: 14px !important;
            box-shadow: var(--shadow) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .leaflet-popup-tip {
            background: var(--surface) !important;
        }
        .leaflet-popup-content {
            margin: 10px 14px !important;
            font-size: 0.85rem !important;
            font-weight: 500;
        }

        /* ── Bottom Panel ── */
        .bottom-panel {
            background: var(--surface);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 14px 16px;
            z-index: 1000;
            flex-shrink: 0;
            border-radius: 22px 22px 0 0;
            box-shadow: 0 -4px 25px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Stats row */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .stat-card {
            background: var(--surface2);
            border-radius: 16px;
            padding: 10px 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.06) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .stat-card:hover::after {
            opacity: 1;
        }
        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 1;
        }
        .stat-value.speed {
            color: var(--accent);
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }
        .stat-value.dist {
            color: var(--accent2);
            text-shadow: 0 0 15px rgba(255, 110, 199, 0.4);
        }
        .stat-value.time {
            color: var(--warning);
            text-shadow: 0 0 15px rgba(255, 165, 2, 0.4);
        }
        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text2);
            margin-top: 2px;
            position: relative;
            z-index: 1;
            font-weight: 600;
        }
        .stat-sub {
            font-size: 0.6rem;
            color: #888;
            position: relative;
            z-index: 1;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn {
            flex: 1;
            padding: 13px 10px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
            color: #fff;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
        }
        .btn:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }
        .btn-start {
            background: linear-gradient(135deg, #2ed573, #1abc5e);
            box-shadow: 0 6px 20px rgba(46, 213, 115, 0.35);
            font-size: 1rem;
        }
        .btn-start:hover {
            box-shadow: 0 8px 28px rgba(46, 213, 115, 0.5);
        }
        .btn-pause {
            background: linear-gradient(135deg, #ffa502, #e68a00);
            box-shadow: 0 6px 20px rgba(255, 165, 2, 0.35);
        }
        .btn-stop {
            background: linear-gradient(135deg, #ff4757, #d63031);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.35);
        }
        .btn-reset {
            background: var(--surface2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex: 0.6;
            font-size: 0.8rem;
        }
        .btn:disabled {
            opacity: 0.45;
            pointer-events: none;
            filter: grayscale(30%);
        }
        .btn .icon {
            font-size: 1.2rem;
        }

        /* Annotation tooltip on map */
        .footprint-annotation {
            background: var(--surface);
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: var(--shadow);
            pointer-events: none;
            letter-spacing: 0.3px;
        }

        /* Pulse marker custom */
        .pulse-marker {
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 20px var(--accent), 0 0 50px rgba(0, 229, 255, 0.6);
            animation: pulse-ring 1.5s infinite;
        }
        .pulse-marker::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            animation: pulse-ring2 1.5s infinite;
            opacity: 0.7;
        }
        @keyframes pulse-ring {
            0%,
            100% {
                box-shadow: 0 0 15px var(--accent), 0 0 35px rgba(0, 229, 255, 0.5);
            }
            50% {
                box-shadow: 0 0 30px var(--accent), 0 0 65px rgba(0, 229, 255, 0.8);
            }
        }
        @keyframes pulse-ring2 {
            0% {
                transform: scale(0.8);
                opacity: 0.9;
            }
            100% {
                transform: scale(2.2);
                opacity: 0;
            }
        }

        /* Responsive tweaks */
        @media (min-width: 600px) {
            .stats-row {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }
            .stat-card {
                padding: 14px 10px;
            }
            .stat-value {
                font-size: 1.7rem;
            }
            .bottom-panel {
                padding: 16px 20px 20px;
                border-radius: 26px 26px 0 0;
            }
        }
    </style>
</head>
<body>

    <!-- ── Header ── -->
    <div class="header">
        <div class="logo">
            <span class="paw">🐾</span> Footprint Tracker
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <span class="header-badge" id="accuracyBadge">⏳ Waiting</span>
            <div class="status-dot" id="statusDot"></div>
        </div>
    </div>

    <!-- ── Map ── -->
    <div id="map"></div>

    <!-- ── Bottom Panel ── -->
    <div class="bottom-panel">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value speed" id="speedVal">0.0</div>
                <div class="stat-label">⚡ Speed (km/h)</div>
                <div class="stat-sub" id="speedMph">0.0 mph</div>
            </div>
            <div class="stat-card">
                <div class="stat-value dist" id="distVal">0</div>
                <div class="stat-label">📏 Total Distance</div>
                <div class="stat-sub" id="distMiles">0.00 mi</div>
            </div>
            <div class="stat-card">
                <div class="stat-value time" id="timeVal">00:00</div>
                <div class="stat-label">⏱ Elapsed</div>
                <div class="stat-sub" id="segmentInfo">Next: --</div>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-start" id="btnStart" title="Start Tracking">
                <span class="icon">▶</span> Start
            </button>
            <button class="btn btn-pause" id="btnPause" disabled title="Pause / Resume">
                <span class="icon">⏸</span> Pause
            </button>
            <button class="btn btn-stop" id="btnStop" disabled title="Stop & Save">
                <span class="icon">⏹</span> Stop
            </button>
            <button class="btn btn-reset" id="btnReset" title="Clear All">
                <span class="icon">🔄</span>
            </button>
        </div>
    </div>

    <script>
        (function() {
            // ─────────────────────────────────────
            // STATE
            // ─────────────────────────────────────
            const state = {
                tracking: false, // actively watching position
                paused: false,
                positions: [], // array of {lat, lng, timestamp, accuracy, speed}
                totalDistanceMeters: 0,
                watchId: null,
                startTime: null,
                elapsedBeforePause: 0, // ms accumulated before latest pause
                pauseStart: null,
                lastPosition: null,
                segmentDistances: [], // distances between consecutive points in meters
            };

            // ─────────────────────────────────────
            // DOM REFS
            // ─────────────────────────────────────
            const mapEl = document.getElementById('map');
            const statusDot = document.getElementById('statusDot');
            const accuracyBadge = document.getElementById('accuracyBadge');
            const speedVal = document.getElementById('speedVal');
            const speedMph = document.getElementById('speedMph');
            const distVal = document.getElementById('distVal');
            const distMiles = document.getElementById('distMiles');
            const timeVal = document.getElementById('timeVal');
            const segmentInfo = document.getElementById('segmentInfo');
            const btnStart = document.getElementById('btnStart');
            const btnPause = document.getElementById('btnPause');
            const btnStop = document.getElementById('btnStop');
            const btnReset = document.getElementById('btnReset');

            // ─────────────────────────────────────
            // LEAFLET MAP INIT
            // ─────────────────────────────────────
            const map = L.map('map', {
                zoomControl: true,
                attributionControl: false,
                zoom: 17,
                maxZoom: 21,
                minZoom: 3,
            }).setView([23.8103, 90.4125], 14); // Default: Dhaka, Bangladesh (centered-ish)

            // Tile layer – CartoDB dark for a sleek look
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 21,
                subdomains: 'abcd',
            }).addTo(map);

            // Custom pane for footprints
            map.createPane('footprints');
            map.getPane('footprints').style.zIndex = 500;
            map.getPane('footprints').style.pointerEvents = 'none';

            // ─────────────────────────────────────
            // MAP LAYERS
            // ─────────────────────────────────────
            const pathLine = L.polyline([], {
                color: '#ff6ec7',
                weight: 4,
                opacity: 0.85,
                smoothFactor: 1,
                pane: 'footprints',
                dashArray: '8 6',
                lineCap: 'round',
                lineJoin: 'round',
            }).addTo(map);

            // Glow trail underneath
            const glowLine = L.polyline([], {
                color: '#ff6ec7',
                weight: 10,
                opacity: 0.25,
                smoothFactor: 1,
                pane: 'footprints',
                lineCap: 'round',
                lineJoin: 'round',
            }).addTo(map);

            // Footprint markers (small circles at each recorded point)
            const footprintMarkers = L.layerGroup().addTo(map);

            // Current location marker (custom divIcon with pulse)
            const currentMarker = L.marker([0, 0], {
                icon: L.divIcon({
                    className: 'pulse-marker',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10],
                }),
                zIndexOffset: 1000,
            });
            // Don't add to map until we have a position

            // Segment annotation markers (showing distance between points)
            const annotationLayer = L.layerGroup().addTo(map);

            // ─────────────────────────────────────
            // HELPER FUNCTIONS
            // ─────────────────────────────────────
            function haversineDistance(lat1, lng1, lat2, lng2) {
                const R = 6371000; // Earth radius in meters
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLng = (lng2 - lng1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLng / 2) * Math.sin(dLng / 2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                return R * c;
            }

            function formatDistance(meters) {
                if (meters < 1) return '0 m';
                if (meters < 1000) return Math.round(meters) + ' m';
                return (meters / 1000).toFixed(2) + ' km';
            }

            function metersToMiles(meters) {
                return meters * 0.000621371;
            }

            function formatTime(ms) {
                const totalSec = Math.floor(ms / 1000);
                const hrs = Math.floor(totalSec / 3600);
                const mins = Math.floor((totalSec % 3600) / 60);
                const secs = totalSec % 60;
                if (hrs > 0) {
                    return `${hrs}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
                }
                return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
            }

            function getElapsedMs() {
                if (!state.startTime) return 0;
                if (state.paused && state.pauseStart) {
                    return state.elapsedBeforePause;
                }
                return state.elapsedBeforePause + (Date.now() - (state.pauseStart || state.startTime));
            }

            function updateUI() {
                const elapsed = getElapsedMs();
                timeVal.textContent = formatTime(elapsed);

                // Speed
                if (state.lastPosition && state.lastPosition.speed !== null && state.lastPosition.speed >=
                    0 && state.tracking && !state.paused) {
                    const speedKmh = state.lastPosition.speed * 3.6;
                    speedVal.textContent = speedKmh.toFixed(1);
                    speedMph.textContent = (speedKmh * 0.621371).toFixed(1) + ' mph';
                } else if (!state.tracking || state.paused) {
                    speedVal.textContent = '0.0';
                    speedMph.textContent = '0.0 mph';
                }

                // Distance
                distVal.textContent = formatDistance(state.totalDistanceMeters);
                distMiles.textContent = metersToMiles(state.totalDistanceMeters).toFixed(2) + ' mi';

                // Segment info (last segment distance)
                if (state.segmentDistances.length > 0) {
                    const lastSeg = state.segmentDistances[state.segmentDistances.length - 1];
                    segmentInfo.textContent = 'Last: ' + formatDistance(lastSeg);
                } else {
                    segmentInfo.textContent = 'Next: --';
                }

                // Accuracy badge
                if (state.lastPosition && state.lastPosition.accuracy) {
                    const acc = state.lastPosition.accuracy;
                    accuracyBadge.textContent = '🎯 ±' + Math.round(acc) + 'm';
                    accuracyBadge.style.color = acc < 10 ? '#2ed573' : acc < 25 ? '#ffa502' : '#ff4757';
                }
            }

            function addFootprintMarker(lat, lng, label) {
                const icon = L.divIcon({
                    className: '',
                    html: `<div style="
                    width:8px;height:8px;
                    background:#ff6ec7;
                    border-radius:50%;
                    box-shadow:0 0 8px #ff6ec7, 0 0 18px rgba(255,110,199,0.6);
                    border:1.5px solid #fff;
                    "></div>`,
                    iconSize: [8, 8],
                    iconAnchor: [4, 4],
                });
                const marker = L.marker([lat, lng], { icon, pane: 'footprints', interactive: false });
                footprintMarkers.addLayer(marker);

                if (label) {
                    const annIcon = L.divIcon({
                        className: 'footprint-annotation',
                        html: label,
                        iconSize: null,
                        iconAnchor: [30, 10],
                    });
                    const annMarker = L.marker([lat, lng], { icon: annIcon, interactive: false, pane: 'footprints' });
                    annotationLayer.addLayer(annMarker);
                    // Auto-remove annotation after some time
                    setTimeout(() => {
                        annotationLayer.removeLayer(annMarker);
                    }, 8000);
                }
            }

            function updatePathOnMap() {
                const coords = state.positions.map(p => [p.lat, p.lng]);
                pathLine.setLatLngs(coords);
                glowLine.setLatLngs(coords);
            }

            function addPosition(lat, lng, accuracy, speed) {
                const now = Date.now();
                const pos = { lat, lng, timestamp: now, accuracy, speed };
                state.positions.push(pos);

                // Calculate segment distance
                if (state.lastPosition && state.tracking && !state.paused) {
                    const segDist = haversineDistance(
                        state.lastPosition.lat, state.lastPosition.lng,
                        lat, lng
                    );
                    if (segDist > 0.3) { // Only count meaningful movement (>30cm)
                        state.totalDistanceMeters += segDist;
                        state.segmentDistances.push(segDist);
                        // Add annotation for this segment
                        const midLat = (state.lastPosition.lat + lat) / 2;
                        const midLng = (state.lastPosition.lng + lng) / 2;
                        const label = formatDistance(segDist);
                        addFootprintMarker(lat, lng, state.segmentDistances.length === 1 ? '🟢 Start' : label);
                    } else if (state.segmentDistances.length === 0 && state.positions.length === 1) {
                        // First point
                        addFootprintMarker(lat, lng, '📍 Start');
                    }
                } else if (state.positions.length === 1) {
                    addFootprintMarker(lat, lng, '📍 Start');
                }

                state.lastPosition = pos;
                updatePathOnMap();

                // Update current marker
                if (!map.hasLayer(currentMarker)) {
                    currentMarker.addTo(map);
                }
                currentMarker.setLatLng([lat, lng]);

                // Recenter map if tracking
                if (state.tracking && !state.paused) {
                    map.panTo([lat, lng], { animate: true, duration: 0.5, easeLinearity: 0.3 });
                }

                updateUI();
            }

            // ─────────────────────────────────────
            // GEOLOCATION
            // ─────────────────────────────────────
            function startWatching() {
                if (!navigator.geolocation) {
                    alert('❌ Geolocation is not supported by your browser.');
                    return;
                }

                state.watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        const { latitude, longitude, accuracy, speed } = position.coords;
                        if (state.tracking && !state.paused) {
                            addPosition(latitude, longitude, accuracy, speed);
                        } else if (!state.tracking && state.positions.length === 0) {
                            // Just show initial position on map before tracking starts
                            state.lastPosition = { lat: latitude, lng: longitude, accuracy, speed, timestamp: Date
                                .now() };
                            if (!map.hasLayer(currentMarker)) {
                                currentMarker.addTo(map);
                            }
                            currentMarker.setLatLng([latitude, longitude]);
                            map.setView([latitude, longitude], 17);
                            accuracyBadge.textContent = '🎯 ±' + Math.round(accuracy) + 'm';
                            accuracyBadge.style.color = accuracy < 10 ? '#2ed573' : accuracy < 25 ? '#ffa502' :
                                '#ff4757';
                            updateUI();
                        }
                        // Always update accuracy badge when tracking
                        if (state.tracking && !state.paused) {
                            state.lastPosition = { ...state.lastPosition, accuracy, speed };
                        }
                    },
                    (error) => {
                        console.error('Geolocation error:', error);
                        let msg = 'Location error: ';
                        switch (error.code) {
                            case error.PERMISSION_DENIED:
                                msg += 'Permission denied. Please allow location access.';
                                break;
                            case error.POSITION_UNAVAILABLE:
                                msg += 'Position unavailable.';
                                break;
                            case error.TIMEOUT:
                                msg += 'Request timed out.';
                                break;
                            default:
                                msg += error.message;
                        }
                        accuracyBadge.textContent = '⚠️ Error';
                        accuracyBadge.style.color = '#ff4757';
                        alert('⚠️ ' + msg);
                    }, {
                        enableHighAccuracy: true,
                        timeout: 15000,
                        maximumAge: 500,
                    }
                );
            }

            function stopWatching() {
                if (state.watchId !== null) {
                    navigator.geolocation.clearWatch(state.watchId);
                    state.watchId = null;
                }
            }

            // ─────────────────────────────────────
            // BUTTON HANDLERS
            // ─────────────────────────────────────
            function startTracking() {
                if (state.tracking && !state.paused) return; // already running
                if (state.paused) {
                    // Resume
                    resumeTracking();
                    return;
                }

                state.tracking = true;
                state.paused = false;
                state.startTime = Date.now();
                state.elapsedBeforePause = 0;
                state.pauseStart = null;
                state.totalDistanceMeters = 0;
                state.positions = [];
                state.segmentDistances = [];
                state.lastPosition = null;
                footprintMarkers.clearLayers();
                annotationLayer.clearLayers();
                pathLine.setLatLngs([]);
                glowLine.setLatLngs([]);
                if (map.hasLayer(currentMarker)) {
                    // Keep marker but reset
                }

                statusDot.classList.add('active');
                btnStart.disabled = true;
                btnPause.disabled = false;
                btnStop.disabled = false;
                btnStart.textContent = '● Tracking';
                btnStart.style.background = 'linear-gradient(135deg, #2ed573, #1abc5e)';
                btnPause.textContent = '⏸ Pause';
                accuracyBadge.textContent = '🔍 Acquiring...';
                accuracyBadge.style.color = '#ffa502';

                // If we already have a watch going, positions will flow in
                // Ensure watch is active
                if (state.watchId === null) {
                    startWatching();
                }
                updateUI();
            }

            function pauseTracking() {
                if (!state.tracking || state.paused) return;
                state.paused = true;
                state.pauseStart = Date.now();
                state.elapsedBeforePause += Date.now() - (state.pauseStart - (Date.now() - state.pauseStart));
                // Recalculate properly:
                state.elapsedBeforePause = getElapsedMs();
                state.pauseStart = Date.now();

                statusDot.classList.remove('active');
                statusDot.style.background = '#ffa502';
                statusDot.style.boxShadow = '0 0 12px #ffa502';
                btnPause.textContent = '▶ Resume';
                btnStart.disabled = true;
                speedVal.textContent = '0.0';
                speedMph.textContent = '0.0 mph';
                updateUI();
            }

            function resumeTracking() {
                if (!state.tracking || !state.paused) return;
                state.paused = false;
                state.pauseStart = null;
                // elapsedBeforePause stays as accumulated time
                statusDot.classList.add('active');
                statusDot.style.background = '#2ed573';
                statusDot.style.boxShadow = '0 0 16px #2ed573';
                btnPause.textContent = '⏸ Pause';
                btnStart.disabled = true;
                updateUI();
            }

            function stopTracking() {
                if (!state.tracking) return;
                state.tracking = false;
                state.paused = false;
                state.pauseStart = null;

                statusDot.classList.remove('active');
                statusDot.style.background = '#ff4757';
                statusDot.style.boxShadow = '0 0 10px #ff4757';
                btnStart.disabled = false;
                btnPause.disabled = true;
                btnStop.disabled = true;
                btnStart.textContent = '▶ Start';
                btnStart.style.background = 'linear-gradient(135deg, #2ed573, #1abc5e)';
                btnPause.textContent = '⏸ Pause';
                speedVal.textContent = '0.0';
                speedMph.textContent = '0.0 mph';
                accuracyBadge.textContent = '⏹ Stopped';
                accuracyBadge.style.color = '#ff4757';
                updateUI();
                // Keep watch for potential restart, but don't add positions
            }

            function resetAll() {
                stopWatching();
                state.tracking = false;
                state.paused = false;
                state.positions = [];
                state.totalDistanceMeters = 0;
                state.watchId = null;
                state.startTime = null;
                state.elapsedBeforePause = 0;
                state.pauseStart = null;
                state.lastPosition = null;
                state.segmentDistances = [];
                footprintMarkers.clearLayers();
                annotationLayer.clearLayers();
                pathLine.setLatLngs([]);
                glowLine.setLatLngs([]);
                if (map.hasLayer(currentMarker)) {
                    map.removeLayer(currentMarker);
                }
                statusDot.classList.remove('active');
                statusDot.style.background = '#ff4757';
                statusDot.style.boxShadow = '0 0 10px #ff4757';
                btnStart.disabled = false;
                btnPause.disabled = true;
                btnStop.disabled = true;
                btnStart.textContent = '▶ Start';
                btnStart.style.background = 'linear-gradient(135deg, #2ed573, #1abc5e)';
                btnPause.textContent = '⏸ Pause';
                speedVal.textContent = '0.0';
                speedMph.textContent = '0.0 mph';
                distVal.textContent = '0 m';
                distMiles.textContent = '0.00 mi';
                timeVal.textContent = '00:00';
                segmentInfo.textContent = 'Next: --';
                accuracyBadge.textContent = '🔄 Ready';
                accuracyBadge.style.color = '#a0a0b8';
                map.setView([23.8103, 90.4125], 14);
                // Restart watch for initial position
                startWatching();
            }

            // ─────────────────────────────────────
            // EVENT LISTENERS
            // ─────────────────────────────────────
            btnStart.addEventListener('click', startTracking);
            btnPause.addEventListener('click', () => {
                if (state.paused) {
                    resumeTracking();
                } else {
                    pauseTracking();
                }
            });
            btnStop.addEventListener('click', stopTracking);
            btnReset.addEventListener('click', resetAll);

            // ─────────────────────────────────────
            // TIMER TICK (for UI updates)
            // ─────────────────────────────────────
            setInterval(() => {
                if (state.tracking && !state.paused) {
                    updateUI();
                }
                // Also update elapsed time even when paused (time is frozen)
                if (state.tracking) {
                    timeVal.textContent = formatTime(getElapsedMs());
                }
            }, 500);

            // ─────────────────────────────────────
            // INIT
            // ─────────────────────────────────────
            function init() {
                statusDot.style.background = '#ff4757';
                statusDot.style.boxShadow = '0 0 10px #ff4757';
                btnPause.disabled = true;
                btnStop.disabled = true;
                accuracyBadge.textContent = '📍 Ready';
                accuracyBadge.style.color = '#a0a0b8';
                // Start watching for initial position (but not tracking)
                startWatching();
                updateUI();
            }

            init();

            console.log('🐾 Footprint Tracker ready!');
            console.log('   - Real-time GPS tracking');
            console.log('   - Distance in meters & miles');
            console.log('   - Speed in km/h & mph');
            console.log('   - Footprint annotations on map');
            console.log('   - Segment distances between points');
            console.log('   - Glowing trail & pulse marker');
            console.log('   Tap "Start" to begin tracking your movement!');
        })();
    </script>
</body>
</html>
