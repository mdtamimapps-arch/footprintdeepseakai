<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🐾 ফুটপ্রিন্ট ট্র্যাকার প্রো | বাংলাদেশ</title>

    <!-- Leaflet CSS + JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <!-- Leaflet Rotated Marker plugin -->
    <script src="https://unpkg.com/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.js">
    </script>

    <style>
        :root {
            --bg: #0a0a14;
            --surface: #141428;
            --surface2: #1e1e36;
            --accent: #00e5ff;
            --accent2: #ff6ec7;
            --text: #e8e8f0;
            --text2: #a0a0b8;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            --radius: 18px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', 'Noto Sans Bengali', system-ui, sans-serif;
            background: var(--bg);
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            flex-direction: column;
        }

        /* ── Top Bar ── */
        .top-bar {
            background: var(--surface);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            gap: 6px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 0.9rem;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .paw {
            font-size: 1.3rem;
            animation: bouncePaw 0.6s ease-in-out infinite alternate;
        }
        @keyframes bouncePaw {
            0% {
                transform: translateY(0) rotate(-5deg);
            }
            100% {
                transform: translateY(-5px) rotate(5deg);
            }
        }
        .controls-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .lang-btn {
            padding: 5px 10px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: var(--surface2);
            color: #ccc;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            font-family: inherit;
        }
        .lang-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 14px rgba(0, 229, 255, 0.4);
        }
        .vehicle-select {
            padding: 5px 8px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: var(--surface2);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }
        .vehicle-select option {
            background: #1a1a2e;
            color: #fff;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            transition: all 0.4s;
            box-shadow: 0 0 8px var(--danger);
            flex-shrink: 0;
        }
        .status-dot.active {
            background: var(--success);
            box-shadow: 0 0 14px var(--success);
            animation: pulse-dot 1.2s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 6px var(--success);
            }
            50% {
                box-shadow: 0 0 20px var(--success), 0 0 36px rgba(46, 213, 115, 0.5);
            }
        }
        .accuracy-badge {
            font-size: 0.65rem;
            padding: 4px 8px;
            border-radius: 14px;
            background: var(--surface2);
            color: var(--text2);
            font-weight: 600;
            white-space: nowrap;
        }

        /* ── Map ── */
        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
            background: #1a1a2e;
        }
        .leaflet-container {
            background: #1a1a2e !important;
        }
        .leaflet-control-zoom a {
            background: var(--surface) !important;
            color: #fff !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            border-radius: 10px !important;
        }
        .leaflet-control-layers {
            background: var(--surface) !important;
            border-radius: 12px !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
        }
        .leaflet-control-layers label {
            color: #ddd !important;
            font-size: 0.75rem;
        }

        /* ── Bottom Panel ── */
        .bottom-panel {
            background: var(--surface);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 12px 14px;
            z-index: 1000;
            flex-shrink: 0;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 25px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }
        .stat-card {
            background: var(--surface2);
            border-radius: 14px;
            padding: 8px 6px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .stat-value.speed {
            color: var(--accent);
            text-shadow: 0 0 12px rgba(0, 229, 255, 0.4);
        }
        .stat-value.dist {
            color: var(--accent2);
            text-shadow: 0 0 12px rgba(255, 110, 199, 0.4);
        }
        .stat-value.time {
            color: var(--warning);
            text-shadow: 0 0 12px rgba(255, 165, 2, 0.4);
        }
        .stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text2);
            font-weight: 600;
        }
        .stat-sub {
            font-size: 0.55rem;
            color: #888;
        }
        .btn-row {
            display: flex;
            gap: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px 8px;
            border-radius: 26px;
            border: none;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.25s;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-family: inherit;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn-start {
            background: linear-gradient(135deg, #2ed573, #1abc5e);
            box-shadow: 0 6px 18px rgba(46, 213, 115, 0.3);
            font-size: 0.9rem;
        }
        .btn-pause {
            background: linear-gradient(135deg, #ffa502, #e68a00);
            box-shadow: 0 6px 18px rgba(255, 165, 2, 0.3);
        }
        .btn-stop {
            background: linear-gradient(135deg, #ff4757, #d63031);
            box-shadow: 0 6px 18px rgba(255, 71, 87, 0.3);
        }
        .btn-reset {
            background: var(--surface2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex: 0.5;
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(25%);
        }
        .btn .icon {
            font-size: 1rem;
        }

        /* Vehicle marker */
        .vehicle-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.6)) drop-shadow(0 0 14px rgba(0, 229, 255, 0.6));
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        /* Annotation */
        .footprint-annotation {
            background: var(--surface);
            color: #fff;
            padding: 5px 10px;
            border-radius: 16px;
            font-size: 0.65rem;
            font-weight: 600;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: var(--shadow);
            pointer-events: none;
        }

        @media (min-width: 500px) {
            .stat-value {
                font-size: 1.5rem;
            }
            .btn {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- ── Top Bar ── -->
    <div class="top-bar" id="topBar">
        <div class="logo-section">
            <span class="paw">🐾</span><span data-lang="title">ফুটপ্রিন্ট ট্র্যাকার</span>
        </div>
        <div class="controls-group">
            <button class="lang-btn active" id="langBn" onclick="setLanguage('bn')">বাংলা</button>
            <button class="lang-btn" id="langEn" onclick="setLanguage('en')">English</button>
            <select class="vehicle-select" id="vehicleSelect" onchange="changeVehicle()">
                <option value="car" data-lang="car">🚗 গাড়ি</option>
                <option value="bike" data-lang="bike">🏍 মোটরসাইকেল</option>
                <option value="walk" data-lang="walk">🚶 হাঁটা</option>
                <option value="cycle" data-lang="cycle">🚲 সাইকেল</option>
            </select>
            <span class="accuracy-badge" id="accuracyBadge">🎯 প্রস্তুত</span>
            <div class="status-dot" id="statusDot"></div>
        </div>
    </div>

    <!-- ── Map ── -->
    <div id="map"></div>

    <!-- ── Bottom Panel ── -->
    <div class="bottom-panel">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value speed" id="speedVal">0.0</div>
                <div class="stat-label" data-lang="speedLabel">⚡ গতি (কিমি/ঘ)</div>
                <div class="stat-sub" id="speedMph">0.0 mph</div>
            </div>
            <div class="stat-card">
                <div class="stat-value dist" id="distVal">0</div>
                <div class="stat-label" data-lang="distLabel">📏 মোট দূরত্ব</div>
                <div class="stat-sub" id="distMiles">0.00 মাইল</div>
            </div>
            <div class="stat-card">
                <div class="stat-value time" id="timeVal">00:00</div>
                <div class="stat-label" data-lang="timeLabel">⏱ সময়</div>
                <div class="stat-sub" id="segmentInfo">পরবর্তী: --</div>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-start" id="btnStart" onclick="startTracking()">
                <span class="icon">▶</span> <span data-lang="startBtn">শুরু</span>
            </button>
            <button class="btn btn-pause" id="btnPause" disabled onclick="togglePause()">
                <span class="icon">⏸</span> <span data-lang="pauseBtn">বিরতি</span>
            </button>
            <button class="btn btn-stop" id="btnStop" disabled onclick="stopTracking()">
                <span class="icon">⏹</span> <span data-lang="stopBtn">থামুন</span>
            </button>
            <button class="btn btn-reset" id="btnReset" onclick="resetAll()">
                <span class="icon">🔄</span>
            </button>
        </div>
    </div>

    <script>
        (function() {
            // ─────────────────────────────────────
            // LANGUAGE SYSTEM
            // ─────────────────────────────────────
            const translations = {
                bn: {
                    title: 'ফুটপ্রিন্ট ট্র্যাকার',
                    car: '🚗 গাড়ি',
                    bike: '🏍 মোটরসাইকেল',
                    walk: '🚶 হাঁটা',
                    cycle: '🚲 সাইকেল',
                    speedLabel: '⚡ গতি (কিমি/ঘ)',
                    distLabel: '📏 মোট দূরত্ব',
                    timeLabel: '⏱ সময়',
                    startBtn: 'শুরু',
                    pauseBtn: 'বিরতি',
                    stopBtn: 'থামুন',
                    segmentNext: 'পরবর্তী: --',
                    segmentLast: 'শেষ:',
                    ready: '🎯 প্রস্তুত',
                    searching: '🔍 খোঁজা হচ্ছে...',
                    stopped: '⏹ থামানো',
                    reset: '🔄 রিসেট',
                    error: '⚠️ ত্রুটি',
                    startAnnotation: '📍 শুরু',
                    kmh: 'কিমি/ঘ',
                    meters: 'মি',
                    km: 'কিমি',
                    miles: 'মাইল',
                },
                en: {
                    title: 'Footprint Tracker',
                    car: '🚗 Car',
                    bike: '🏍 Motorcycle',
                    walk: '🚶 Walking',
                    cycle: '🚲 Bicycle',
                    speedLabel: '⚡ Speed (km/h)',
                    distLabel: '📏 Total Distance',
                    timeLabel: '⏱ Elapsed',
                    startBtn: 'Start',
                    pauseBtn: 'Pause',
                    stopBtn: 'Stop',
                    segmentNext: 'Next: --',
                    segmentLast: 'Last:',
                    ready: '🎯 Ready',
                    searching: '🔍 Searching...',
                    stopped: '⏹ Stopped',
                    reset: '🔄 Reset',
                    error: '⚠️ Error',
                    startAnnotation: '📍 Start',
                    kmh: 'km/h',
                    meters: 'm',
                    km: 'km',
                    miles: 'mi',
                }
            };

            let currentLang = 'bn';

            function setLanguage(lang) {
                currentLang = lang;
                document.getElementById('langBn').classList.toggle('active', lang === 'bn');
                document.getElementById('langEn').classList.toggle('active', lang === 'en');
                document.querySelectorAll('[data-lang]').forEach(el => {
                    const key = el.getAttribute('data-lang');
                    if (translations[lang] && translations[lang][key]) {
                        if (el.tagName === 'OPTION') {
                            el.textContent = translations[lang][key];
                        } else {
                            el.textContent = translations[lang][key];
                        }
                    }
                });
                // Update vehicle select options
                const vehicleSelect = document.getElementById('vehicleSelect');
                const options = vehicleSelect.options;
                for (let i = 0; i < options.length; i++) {
                    const key = options[i].getAttribute('data-lang');
                    if (translations[lang] && translations[lang][key]) {
                        options[i].textContent = translations[lang][key];
                    }
                }
                updateUI();
            }
            window.setLanguage = setLanguage;

            function t(key) {
                return translations[currentLang] && translations[currentLang][key] ? translations[currentLang][
                    key
                ] : key;
            }

            // ─────────────────────────────────────
            // STATE
            // ─────────────────────────────────────
            const state = {
                tracking: false,
                paused: false,
                positions: [],
                totalDistanceMeters: 0,
                watchId: null,
                startTime: null,
                elapsedBeforePause: 0,
                pauseStart: null,
                lastPosition: null,
                segmentDistances: [],
                vehicleType: 'car',
                currentBearing: 0,
                animFrame: null,
                targetLatLng: null,
                currentAnimLatLng: null,
            };

            // ─────────────────────────────────────
            // DOM
            // ─────────────────────────────────────
            const statusDot = document.getElementById('statusDot');
            const accuracyBadge = document.getElementById('accuracyBadge');
            const speedVal = document.getElementById('speedVal');
            const speedMph = document.getElementById('speedMph');
            const distVal = document.getElementById('distVal');
            const distMiles = document.getElementById('distMiles');
            const timeVal = document.getElementById('timeVal');
            const segmentInfo = document.getElementById('segmentInfo');
            const btnStart = document.getElementById('btnStart');
            const btnPause = document.getElementById('btnPause');
            const btnStop = document.getElementById('btnStop');
            const vehicleSelect = document.getElementById('vehicleSelect');

            // ─────────────────────────────────────
            // MAP SETUP
            // ─────────────────────────────────────
            const map = L.map('map', {
                zoomControl: true,
                attributionControl: false,
                zoom: 7,
                maxZoom: 22,
                minZoom: 4,
            }).setView([23.6850, 90.3563], 7);

            // ── Tile Layers ──
            // Satellite (Esri - very clear for Bangladesh)
            const satelliteLayer = L.tileLayer(
                'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    maxZoom: 22,
                    attribution: '© Esri',
                }
            );

            // Dark streets
            const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 22,
                subdomains: 'abcd',
            });

            // Hybrid (satellite + labels) - using CartoDB light labels over satellite
            const labelLayer = L.tileLayer(
                'https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
                    maxZoom: 22,
                    subdomains: 'abcd',
                    opacity: 0.9,
                });

            // Start with satellite + labels
            satelliteLayer.addTo(map);
            labelLayer.addTo(map);

            // Layer control
            const baseMaps = {
                "🛰️ স্যাটেলাইট": satelliteLayer,
                "🌙 ডার্ক ম্যাপ": darkLayer,
            };
            const overlayMaps = {
                "🏷️ লেবেল": labelLayer,
            };
            L.control.layers(baseMaps, overlayMaps, { position: 'topright', collapsed: true }).addTo(map);

            // Custom pane
            map.createPane('footprints');
            map.getPane('footprints').style.zIndex = 500;
            map.getPane('footprints').style.pointerEvents = 'none';

            // ── Path layers ──
            const pathLine = L.polyline([], {
                color: '#ff6ec7',
                weight: 4,
                opacity: 0.85,
                smoothFactor: 1,
                pane: 'footprints',
                dashArray: '8 6',
                lineCap: 'round',
                lineJoin: 'round',
            }).addTo(map);

            const glowLine = L.polyline([], {
                color: '#ff6ec7',
                weight: 10,
                opacity: 0.2,
                smoothFactor: 1,
                pane: 'footprints',
                lineCap: 'round',
                lineJoin: 'round',
            }).addTo(map);

            const footprintMarkers = L.layerGroup().addTo(map);
            const annotationLayer = L.layerGroup().addTo(map);

            // Vehicle icons
            const vehicleIcons = {
                car: '🚗',
                bike: '🏍️',
                walk: '🚶',
                cycle: '🚲',
            };

            // Current vehicle marker (using DivIcon for emoji)
            let currentMarker = null;

            function createVehicleIcon(vehicleType) {
                return L.divIcon({
                    className: '',
                    html: `<div class="vehicle-icon" style="font-size:32px;">${vehicleIcons[vehicleType] || '🚗'}</div>`,
                    iconSize: [40, 40],
                    iconAnchor: [20, 20],
                });
            }

            function updateVehicleMarker() {
                if (currentMarker && map.hasLayer(currentMarker)) {
                    const icon = createVehicleIcon(state.vehicleType);
                    currentMarker.setIcon(icon);
                }
            }

            window.changeVehicle = function() {
                state.vehicleType = vehicleSelect.value;
                updateVehicleMarker();
            };

            // ─────────────────────────────────────
            // HELPERS
            // ─────────────────────────────────────
            function haversineDistance(lat1, lng1, lat2, lng2) {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLng = (lng2 - lng1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLng / 2) * Math.sin(dLng / 2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                return R * c;
            }

            function bearing(lat1, lng1, lat2, lng2) {
                const dLng = (lng2 - lng1) * Math.PI / 180;
                const y = Math.sin(dLng) * Math.cos(lat2 * Math.PI / 180);
                const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                    Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLng);
                let brng = Math.atan2(y, x) * 180 / Math.PI;
                return (brng + 360) % 360;
            }

            function formatDistance(meters) {
                if (meters < 1) return '0 ' + t('meters');
                if (meters < 1000) return Math.round(meters) + ' ' + t('meters');
                return (meters / 1000).toFixed(2) + ' ' + t('km');
            }

            function metersToMiles(meters) {
                return meters * 0.000621371;
            }

            function formatTime(ms) {
                const totalSec = Math.floor(ms / 1000);
                const hrs = Math.floor(totalSec / 3600);
                const mins = Math.floor((totalSec % 3600) / 60);
                const secs = totalSec % 60;
                if (hrs > 0) return `${hrs}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
                return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
            }

            function getElapsedMs() {
                if (!state.startTime) return 0;
                if (state.paused && state.pauseStart) return state.elapsedBeforePause;
                return state.elapsedBeforePause + (Date.now() - (state.pauseStart || state.startTime));
            }

            // ── Smooth animation for vehicle marker ──
            function animateMarker(targetLat, targetLng, targetBearing) {
                state.targetLatLng = [targetLat, targetLng];
                state.currentBearing = targetBearing;
                if (!state.animFrame) {
                    smoothStep();
                }
            }

            function smoothStep() {
                if (!currentMarker || !map.hasLayer(currentMarker) || !state.targetLatLng) {
                    state.animFrame = null;
                    return;
                }
                const current = currentMarker.getLatLng();
                const target = state.targetLatLng;
                const dx = target[0] - current.lat;
                const dy = target[1] - current.lng;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 0.000001) {
                    // Close enough
                    currentMarker.setLatLng(target);
                    state.animFrame = null;
                    return;
                }

                const step = Math.min(dist, 0.0003); // smooth step
                const ratio = step / dist;
                const newLat = current.lat + dx * ratio;
                const newLng = current.lng + dy * ratio;

                currentMarker.setLatLng([newLat, newLng]);
                // Rotate marker (leaflet-rotatedmarker may not support divIcon perfectly, so we use CSS transform)
                const iconEl = currentMarker.getElement();
                if (iconEl) {
                    const vehicleDiv = iconEl.querySelector('.vehicle-icon');
                    if (vehicleDiv) {
                        vehicleDiv.style.transform = `rotate(${state.currentBearing}deg)`;
                    }
                }

                state.animFrame = requestAnimationFrame(smoothStep);
            }

            function updateUI() {
                const elapsed = getElapsedMs();
                timeVal.textContent = formatTime(elapsed);

                if (state.lastPosition && state.lastPosition.speed !== null && state.lastPosition.speed >=
                    0 && state.tracking && !state.paused) {
                    const speedKmh = state.lastPosition.speed * 3.6;
                    speedVal.textContent = speedKmh.toFixed(1);
                    speedMph.textContent = (speedKmh * 0.621371).toFixed(1) + ' mph';
                } else if (!state.tracking || state.paused) {
                    speedVal.textContent = '0.0';
                    speedMph.textContent = '0.0 mph';
                }

                distVal.textContent = formatDistance(state.totalDistanceMeters);
                distMiles.textContent = metersToMiles(state.totalDistanceMeters).toFixed(2) + ' ' + t('miles');

                if (state.segmentDistances.length > 0) {
                    const lastSeg = state.segmentDistances[state.segmentDistances.length - 1];
                    segmentInfo.textContent = t('segmentLast') + ' ' + formatDistance(lastSeg);
                } else {
                    segmentInfo.textContent = t('segmentNext');
                }

                if (state.lastPosition && state.lastPosition.accuracy) {
                    const acc = state.lastPosition.accuracy;
                    accuracyBadge.textContent = '🎯 ±' + Math.round(acc) + 'm';
                    accuracyBadge.style.color = acc < 10 ? '#2ed573' : acc < 25 ? '#ffa502' : '#ff4757';
                }
            }

            function addFootprintMarker(lat, lng, label) {
                const icon = L.divIcon({
                    className: '',
                    html: `<div style="width:7px;height:7px;background:#ff6ec7;border-radius:50%;box-shadow:0 0 8px #ff6ec7,0 0 16px rgba(255,110,199,0.5);border:1px solid #fff;"></div>`,
                    iconSize: [7, 7],
                    iconAnchor: [3, 3],
                });
                L.marker([lat, lng], { icon, pane: 'footprints', interactive: false }).addTo(footprintMarkers);

                if (label) {
                    const annIcon = L.divIcon({
                        className: 'footprint-annotation',
                        html: label,
                        iconSize: null,
                        iconAnchor: [25, 8],
                    });
                    const annMarker = L.marker([lat, lng], { icon: annIcon, interactive: false, pane: 'footprints' })
                        .addTo(annotationLayer);
                    setTimeout(() => annotationLayer.removeLayer(annMarker), 8000);
                }
            }

            function updatePathOnMap() {
                const coords = state.positions.map(p => [p.lat, p.lng]);
                pathLine.setLatLngs(coords);
                glowLine.setLatLngs(coords);
            }

            function addPosition(lat, lng, accuracy, speed) {
                const now = Date.now();
                const pos = { lat, lng, timestamp: now, accuracy, speed };
                state.positions.push(pos);

                if (state.lastPosition && state.tracking && !state.paused) {
                    const segDist = haversineDistance(state.lastPosition.lat, state.lastPosition.lng, lat, lng);
                    if (segDist > 0.3) {
                        state.totalDistanceMeters += segDist;
                        state.segmentDistances.push(segDist);
                        const label = state.segmentDistances.length === 1 ? t('startAnnotation') : formatDistance(
                            segDist);
                        addFootprintMarker(lat, lng, label);
                    } else if (state.segmentDistances.length === 0 && state.positions.length === 1) {
                        addFootprintMarker(lat, lng, t('startAnnotation'));
                    }
                } else if (state.positions.length === 1) {
                    addFootprintMarker(lat, lng, t('startAnnotation'));
                }

                // Calculate bearing
                let brng = state.currentBearing;
                if (state.lastPosition) {
                    brng = bearing(state.lastPosition.lat, state.lastPosition.lng, lat, lng);
                }
                state.lastPosition = pos;
                updatePathOnMap();

                // Create or update vehicle marker
                if (!currentMarker) {
                    currentMarker = L.marker([lat, lng], {
                        icon: createVehicleIcon(state.vehicleType),
                        zIndexOffset: 1000,
                        interactive: false,
                    }).addTo(map);
                }
                // Animate to new position
                animateMarker(lat, lng, brng);

                if (state.tracking && !state.paused) {
                    map.panTo([lat, lng], { animate: true, duration: 0.6, easeLinearity: 0.2 });
                }

                updateUI();
            }

            // ─────────────────────────────────────
            // GEOLOCATION
            // ─────────────────────────────────────
            function startWatching() {
                if (!navigator.geolocation) {
                    alert('Geolocation not supported');
                    return;
                }
                state.watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        const { latitude, longitude, accuracy, speed } = position.coords;
                        if (state.tracking && !state.paused) {
                            addPosition(latitude, longitude, accuracy, speed);
                        } else if (!state.tracking && state.positions.length === 0) {
                            state.lastPosition = { lat: latitude, lng: longitude, accuracy, speed,
                                timestamp: Date.now() };
                            if (!currentMarker) {
                                currentMarker = L.marker([latitude, longitude], {
                                    icon: createVehicleIcon(state.vehicleType),
                                    zIndexOffset: 1000,
                                    interactive: false,
                                }).addTo(map);
                            }
                            currentMarker.setLatLng([latitude, longitude]);
                            map.setView([latitude, longitude], 16);
                            accuracyBadge.textContent = '🎯 ±' + Math.round(accuracy) + 'm';
                            updateUI();
                        }
                    },
                    (error) => {
                        accuracyBadge.textContent = t('error');
                        accuracyBadge.style.color = '#ff4757';
                    }, {
                        enableHighAccuracy: true,
                        timeout: 20000,
                        maximumAge: 300,
                    }
                );
            }

            function stopWatching() {
                if (state.watchId !== null) {
                    navigator.geolocation.clearWatch(state.watchId);
                    state.watchId = null;
                }
            }

            // ─────────────────────────────────────
            // BUTTONS
            // ─────────────────────────────────────
            window.startTracking = function() {
                if (state.tracking && !state.paused) return;
                if (state.paused) { resumeTracking(); return; }

                state.tracking = true;
                state.paused = false;
                state.startTime = Date.now();
                state.elapsedBeforePause = 0;
                state.pauseStart = null;
                state.totalDistanceMeters = 0;
                state.positions = [];
                state.segmentDistances = [];
                state.lastPosition = null;
                footprintMarkers.clearLayers();
                annotationLayer.clearLayers();
                pathLine.setLatLngs([]);
                glowLine.setLatLngs([]);

                statusDot.classList.add('active');
                btnStart.disabled = true;
                btnPause.disabled = false;
                btnStop.disabled = false;
                document.querySelector('#btnStart span:last-child').textContent = '● ' + (currentLang === 'bn' ?
                    'চলছে' : 'Running');
                accuracyBadge.textContent = t('searching');
                accuracyBadge.style.color = '#ffa502';

                if (state.watchId === null) startWatching();
                updateUI();
            };

            window.togglePause = function() {
                if (state.paused) resumeTracking();
                else pauseTracking();
            };

            function pauseTracking() {
                if (!state.tracking || state.paused) return;
                state.paused = true;
                state.pauseStart = Date.now();
                state.elapsedBeforePause = getElapsedMs();
                statusDot.classList.remove('active');
                statusDot.style.background = '#ffa502';
                statusDot.style.boxShadow = '0 0 10px #ffa502';
                document.querySelector('#btnPause span:last-child').textContent = currentLang === 'bn' ? '▶ চালু' :
                    '▶ Resume';
                btnStart.disabled = true;
                speedVal.textContent = '0.0';
                speedMph.textContent = '0.0 mph';
                updateUI();
            }

            function resumeTracking() {
                if (!state.tracking || !state.paused) return;
                state.paused = false;
                state.pauseStart = null;
                statusDot.classList.add('active');
                statusDot.style.background = '#2ed573';
                statusDot.style.boxShadow = '0 0 14px #2ed573';
                document.querySelector('#btnPause span:last-child').textContent = currentLang === 'bn' ? '⏸ বিরতি' :
                    '⏸ Pause';
                btnStart.disabled = true;
                updateUI();
            }

            window.stopTracking = function() {
                if (!state.tracking) return;
                state.tracking = false;
                state.paused = false;
                state.pauseStart = null;
                statusDot.classList.remove('active');
                statusDot.style.background = '#ff4757';
                statusDot.style.boxShadow = '0 0 8px #ff4757';
                btnStart.disabled = false;
                btnPause.disabled = true;
                btnStop.disabled = true;
                document.querySelector('#btnStart span:last-child').textContent = t('startBtn');
                document.querySelector('#btnPause span:last-child').textContent = t('pauseBtn');
                speedVal.textContent = '0.0';
                speedMph.textContent = '0.0 mph';
                accuracyBadge.textContent = t('stopped');
                accuracyBadge.style.color = '#ff4757';
                updateUI();
            };

            window.resetAll = function() {
                stopWatching();
                state.tracking = false;
                state.paused = false;
                state.positions = [];
                state.totalDistanceMeters = 0;
                state.watchId = null;
                state.startTime = null;
                state.elapsedBeforePause = 0;
                state.pauseStart = null;
                state.lastPosition = null;
                state.segmentDistances = [];
                state.targetLatLng = null;
                if (state.animFrame) cancelAnimationFrame(state.animFrame);
                state.animFrame = null;
                footprintMarkers.clearLayers();
                annotationLayer.clearLayers();
                pathLine.setLatLngs([]);
                glowLine.setLatLngs([]);
                if (currentMarker && map.hasLayer(currentMarker)) {
                    map.removeLayer(currentMarker);
                    currentMarker = null;
                }
                statusDot.classList.remove('active');
                statusDot.style.background = '#ff4757';
                statusDot.style.boxShadow = '0 0 8px #ff4757';
                btnStart.disabled = false;
                btnPause.disabled = true;
                btnStop.disabled = true;
                document.querySelector('#btnStart span:last-child').textContent = t('startBtn');
                document.querySelector('#btnPause span:last-child').textContent = t('pauseBtn');
                speedVal.textContent = '0.0';
                speedMph.textContent = '0.0 mph';
                distVal.textContent = '0 ' + t('meters');
                distMiles.textContent = '0.00 ' + t('miles');
                timeVal.textContent = '00:00';
                segmentInfo.textContent = t('segmentNext');
                accuracyBadge.textContent = t('ready');
                accuracyBadge.style.color = '#a0a0b8';
                map.setView([23.6850, 90.3563], 7);
                startWatching();
            };

            // ─────────────────────────────────────
            // TIMER
            // ─────────────────────────────────────
            setInterval(() => {
                if (state.tracking && !state.paused) updateUI();
                if (state.tracking) timeVal.textContent = formatTime(getElapsedMs());
            }, 500);

            // ─────────────────────────────────────
            // INIT
            // ─────────────────────────────────────
            function init() {
                statusDot.style.background = '#ff4757';
                statusDot.style.boxShadow = '0 0 8px #ff4757';
                btnPause.disabled = true;
                btnStop.disabled = true;
                accuracyBadge.textContent = t('ready');
                accuracyBadge.style.color = '#a0a0b8';
                setLanguage('bn');
                startWatching();
                updateUI();
            }

            init();
            console.log('🐾 ফুটপ্রিন্ট ট্র্যাকার প্রো - বাংলাদেশ | Satellite + Vehicle Animation Ready');
        })();
    </script>
</body>
</html>
